name: Build & Publish Docker Images

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/badboerdi-backend
  STUDIO_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/badboerdi-studio
  CHATBOT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/badboerdi-chatbot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_env: BACKEND_IMAGE
          - name: studio
            context: ./studio
            dockerfile: ./studio/Dockerfile
            image_env: STUDIO_IMAGE
          - name: chatbot
            context: ./chatbot
            dockerfile: ./chatbot/Dockerfile
            image_env: CHATBOT_IMAGE
    steps:
      - uses: actions/checkout@v5

      - name: Debug secret presence
        run: |
          echo "user set: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "token set: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
