id: oer-grundlagen
label: "OER-Grundlagen und -Strategie"
mode: on_demand
description: >
  Allgemeine OER-Grundlagen: UNESCO-Empfehlung (2019), BMBF-OER-Strategie (2022),
  internationale Einbettung (UN SDG 4, EU-Aktionsplan), 21st Century Skills,
  Open Educational Practices (OEP), CC-Lizenzen, Metadatenstandards,
  Handlungsfelder der deutschen OER-Foerderung und Foerderprogramme.
  Wird aktiviert bei Fragen zu OER-Politik, -Definitionen, -Foerderung,
  -Infrastruktur und -Strategie ausserhalb der WLO-Plattform.
