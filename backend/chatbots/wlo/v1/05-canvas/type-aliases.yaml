  folien: praesentation
  vortrag: praesentation

  quiz: quiz
  test: quiz
  "quiz/test": quiz

  checkliste: checkliste
  checklist: checkliste

  glossar: glossar
  begriffe: glossar

  strukturuebersicht: struktur
  strukturübersicht: struktur
  struktur: struktur
  mindmap: struktur
  themenuebersicht: struktur
  themenübersicht: struktur
  übersicht: struktur

  uebung: uebung
