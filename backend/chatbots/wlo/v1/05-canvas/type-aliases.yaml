# Canvas-Material-Typ-Aliases
# ============================================================================
# Hier wird definiert, wie frei geschriebene Wörter auf die internen
# Canvas-Typ-IDs (aus material-types.yaml) gemappt werden.
#
# - aliases: Direkt-Lookup. User schreibt den Key → Typ wird gewählt.
#   Groß-/Kleinschreibung egal, Umlaute werden separat normalisiert.
# - short_whitelist: Kurze Wörter (<6 Zeichen), die trotzdem erkannt werden
#   dürfen, wenn sie in einer längeren Nachricht stehen. Nur aufnehmen,
#   wenn die Verwechslungsgefahr minimal ist (z.B. 'quiz' ist eindeutig,
#   'info' wäre mehrdeutig und gehört NICHT hierhin).
# - lrt_to_type: Mapping von edu-sharing `learning_resource_types`-Werten
#   auf Canvas-Typ. Wird im Remix-Flow benutzt, damit ein Video-Remix ein
#   Infoblatt wird, ein Arbeitsblatt-Remix bleibt Arbeitsblatt, etc.
#
# Änderungen wirken live (mtime-Cache).

aliases:
  # Automatisch
  auto: auto
  automatisch: auto
  ki: auto

  # Didaktisch
  arbeitsblatt: arbeitsblatt
  aufgabenblatt: arbeitsblatt
  worksheet: arbeitsblatt

  infoblatt: infoblatt
  info: infoblatt
  informationsblatt: infoblatt
  zusammenfassung: infoblatt

  praesentation: praesentation
