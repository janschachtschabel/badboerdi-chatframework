  jahresbericht: bericht
  lagebericht: bericht

  factsheet: factsheet
  faktenblatt: factsheet
  kennzahlen: factsheet
  kpis: factsheet
  kpi: factsheet
  fakten: factsheet
  uebersicht: factsheet

  steckbrief: steckbrief
  projektsteckbrief: steckbrief
  projektinfo: steckbrief
  projektprofil: steckbrief

  pressemitteilung: pressemitteilung
  presse: pressemitteilung
  pm: pressemitteilung
  pressetext: pressemitteilung
  medienmitteilung: pressemitteilung

  vergleich: vergleich
  gegenueberstellung: vergleich
  gegenüberstellung: vergleich
  matrix: vergleich
  vergleichsanalyse: vergleich
  evaluation: vergleich

# Kurze Keywords (unter 6 Zeichen), die trotzdem matchen dürfen.
# Vorsicht: nur aufnehmen, wenn die Verwechslungsgefahr minimal ist.
short_whitelist:
  - quiz
  - test
  - kpi
  - pm

# Mapping: edu-sharing-LRT-Wert → Canvas-Typ (für Remix-Flow).
# Wenn ein Content-Node beim Remix eine LRT-Angabe liefert, wird der
# neue Canvas-Output in diesen Typ umgewandelt. Nicht gemappte LRT
# fallen auf 'auto' zurück.
lrt_to_type:
